<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C4CA"/>
      <stop offset="50%" style="stop-color:#DEB8E0"/>
      <stop offset="100%" style="stop-color:#B8D4C8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="192" height="96" rx="42" fill="url(#shine)" opacity="0.4"/>
  <!-- Center coin circle -->
  <circle cx="96" cy="84.48" r="57.599999999999994" fill="rgba(255,255,255,0.25)"/>
  <!-- ¥ symbol -->
  <text x="96" y="107.52000000000001" 
    font-family="Georgia, serif" 
    font-size="72.96000000000001" 
    font-weight="bold"
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
    opacity="0.95">¥</text>
  <!-- Bottom label -->
  <text x="96" y="157.44" 
    font-family="sans-serif" 
    font-size="19.200000000000003" 
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
    opacity="0.9">わりかん帳</text>
  <!-- Sparkle dots -->
  <circle cx="34.56" cy="42.24" r="4.800000000000001" fill="white" opacity="0.7"/>
  <circle cx="157.44" cy="53.760000000000005" r="3.4559999999999995" fill="white" opacity="0.6"/>
  <circle cx="145.92000000000002" cy="138.24" r="4.224" fill="white" opacity="0.65"/>
  <circle cx="46.08" cy="130.56" r="3.072" fill="white" opacity="0.6"/>
</svg>