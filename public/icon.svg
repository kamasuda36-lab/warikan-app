<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2C4CA"/>
      <stop offset="50%" style="stop-color:#DEB8E0"/>
      <stop offset="100%" style="stop-color:#B8D4C8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="113" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="113" fill="url(#shine)" opacity="0.4"/>
  <!-- Center coin circle -->
  <circle cx="256" cy="225.28" r="153.6" fill="rgba(255,255,255,0.25)"/>
  <!-- ¥ symbol -->
  <text x="256" y="286.72" 
    font-family="Georgia, serif" 
    font-size="194.56" 
    font-weight="bold"
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
    opacity="0.95">¥</text>
  <!-- Bottom label -->
  <text x="256" y="419.84" 
    font-family="sans-serif" 
    font-size="51.2" 
    fill="white" 
    text-anchor="middle" 
    dominant-baseline="middle"
    opacity="0.9">わりかん帳</text>
  <!-- Sparkle dots -->
  <circle cx="92.16" cy="112.64" r="12.8" fill="white" opacity="0.7"/>
  <circle cx="419.84" cy="143.36" r="9.216" fill="white" opacity="0.6"/>
  <circle cx="389.12" cy="368.64" r="11.264" fill="white" opacity="0.65"/>
  <circle cx="122.88" cy="348.16" r="8.192" fill="white" opacity="0.6"/>
</svg>